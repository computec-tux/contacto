<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computec</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome para los logos oficiales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f4f7fc;
            touch-action: manipulation; 
        }
        .mono {
            font-family: 'Space Mono', monospace;
        }
        .cursor-blink::after {
            content: '_';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        /* Gradiente de Instagram real para el icono */
        .instagram-color {
            background: -webkit-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Patrón de puntos tecnológicos simulando la imagen */
        .tech-dots {
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-slate-700 p-4 sm:p-6 select-none md:cursor-default relative overflow-hidden">

    <!-- ELEMENTOS DE DISEÑO (Basados exactamente en la imagen de Computec) -->
    
    <!-- Esquina superior izquierda (Degradado Azul a Celeste) -->
    <div id="glow-top" class="absolute top-[-50px] left-[-50px] w-48 h-48 sm:w-64 sm:h-64 bg-gradient-to-br from-blue-700 via-blue-600 to-cyan-400 rounded-br-[80px] transform -rotate-12 opacity-95 transition-all duration-300"></div>
    
    <!-- Esquina inferior derecha (Degradado Azul a Celeste) -->
    <div id="glow-bottom" class="absolute bottom-[-50px] right-[-50px] w-48 h-48 sm:w-64 sm:h-64 bg-gradient-to-tl from-blue-700 via-blue-600 to-cyan-400 rounded-tl-[80px] transform -rotate-12 opacity-95 transition-all duration-300"></div>

    <!-- Patrones de Puntos Tecnológicos (Lados izquierdo y derecho) -->
    <div class="absolute left-6 top-1/3 w-16 h-24 tech-dots opacity-40 hidden sm:block"></div>
    <div class="absolute right-6 bottom-1/3 w-16 h-24 tech-dots opacity-40 hidden sm:block"></div>

    <!-- Líneas de circuito ultra finas -->
    <div class="absolute inset-0 pointer-events-none opacity-20">
        <div class="absolute top-1/4 right-0 w-32 h-[1px] bg-blue-500"></div>
        <div class="absolute top-1/4 right-32 w-[1px] h-12 bg-blue-500"></div>
    </div>


    <!-- CONTENEDOR PRINCIPAL CARD (Minimalista y profesional) -->
    <div class="w-full max-w-xs mx-auto text-center z-10 bg-white/80 backdrop-blur-md border border-slate-100 rounded-2xl p-6 sm:p-8 shadow-[0_10px_30px_rgba(30,41,59,0.05)]">
        
        <!-- Encabezado con Efecto Escritura -->
        <header class="mb-8">
            <h1 id="typing-logo" class="text-2xl sm:text-3xl font-bold tracking-[0.2em] text-blue-800 uppercase mono h-9 cursor-blink"></h1>
            <div class="w-12 h-[2px] bg-cyan-400 mx-auto mt-1 rounded-full"></div>
        </header>

        <!-- Botones de Redes -->
        <nav class="space-y-3.5">
            
            <!-- WhatsApp -->
            <a href="https://wa.me/529612577561?text=Buenos%20d%C3%ADas%20Computec,%20me%20gustar%C3%ADa%20recibir%20m%C3%A1s%20informaci%C3%B3n%20sobre%20sus%20servicios." 
               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-wider text-slate-700 border border-slate-100 bg-white rounded-xl uppercase mono transition-all duration-300 hover:border-emerald-400 hover:shadow-md active:scale-[0.98] md:active:scale-100">
                <span class="flex items-center gap-3.5">
                    <i class="fab fa-whatsapp text-lg text-[#25D366]"></i>
                    WhatsApp
                </span>
                <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1RfZCCnHMS/" 
               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-wider text-slate-700 border border-slate-100 bg-white rounded-xl uppercase mono transition-all duration-300 hover:border-blue-400 hover:shadow-md active:scale-[0.98] md:active:scale-100">
                <span class="flex items-center gap-3.5">
                    <i class="fab fa-facebook text-lg text-[#1877F2]"></i>
                    Facebook
                </span>
                <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/computectux?igsh=bDk0Z3BrdHRkb2Riy" 
               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-wider text-slate-700 border border-slate-100 bg-white rounded-xl uppercase mono transition-all duration-300 hover:border-pink-400 hover:shadow-md active:scale-[0.98] md:active:scale-100">
                <span class="flex items-center gap-3.5">
                    <i class="fab fa-instagram text-lg instagram-color"></i>
                    Instagram
                </span>
                <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
            </a>

            <!-- TikTok -->
            <a href="https://www.tiktok.com/@computectux?_r=1&_t=ZS-97W1YLEGykp" 
               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-wider text-slate-700 border border-slate-100 bg-white rounded-xl uppercase mono transition-all duration-300 hover:border-cyan-400 hover:shadow-md active:scale-[0.98] md:active:scale-100">
                <span class="flex items-center gap-3.5">
                    <i class="fab fa-tiktok text-lg text-[#000000]"></i>
                    TikTok
                </span>
                <i class="fas fa-chevron-right text-[10px] text-slate-300"></i>
            </a>

        </nav>

        <!-- Footer / Slogan Oficial -->
        <footer class="mt-8 text-[11px] tracking-wide text-blue-900 font-semibold px-1">
            Computec: <span class="text-slate-500 font-normal">Compromiso total con tu equipo.</span>
        </footer>

    </div>

    <!-- Script de Efectos -->
    <script>
        // --- EFECTO ESCRITURA (TYPING) ---
        const text = "COMPUTEC";
        const speed = 100; 
        let i = 0;
        const logoContainer = document.getElementById("typing-logo");

        function typeWriter() {
            if (i < text.length) {
                logoContainer.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
        window.onload = typeWriter;

        // --- INTERACTIVIDAD AL TOCAR PANTALLA (Iluminación de esquinas) ---
        const glowTop = document.getElementById("glow-top");
        const glowBottom = document.getElementById("glow-bottom");

        window.addEventListener("pointerdown", (e) => {
            if (e.target.closest('a')) return; // No se activa si tocan botones
            
            // Incrementa el brillo y escala un poco las esquinas de color de la imagen
            glowTop.style.transform = "scale(1.08) rotate(-10deg)";
            glowBottom.style.transform = "scale(1.08) rotate(-10deg)";
        });

        const resetGlow = () => {
            glowTop.style.transform = "scale(1) rotate(-12deg)";
            glowBottom.style.transform = "scale(1) rotate(-12deg)";
        };

        window.addEventListener("pointerup", resetGlow);
        window.addEventListener("pointerleave", resetGlow);
    </script>

</body>
</html>
