    <!-- FontAwesome para los logos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f4f7fc;
            transition: background-color 0.3s ease;
            touch-action: manipulation;
            overflow: hidden; 
        }
        .mono {

        }
        .cursor-blink::after {

        }

            0%, 100% { opacity: 0; }

        }
        .instagram-color {
            background: -webkit-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        </header>

        <!-- Botones de Redes (Estéticos, balanceados y estilizados) -->
        <nav class="space-y-3">
            
            <!-- WhatsApp -->

               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-widest text-slate-700 border border-slate-100 bg-slate-50/40 rounded-xl uppercase mono transition-all duration-300 hover:border-emerald-400 hover:bg-white hover:shadow-md active:scale-[0.98] md:active:scale-100">

                    <i class="fab fa-whatsapp text-base text-[#25D366]"></i>

            </a>

            <!-- Facebook -->
            <a href="https://www.facebook.com/share/1RfZCCnHMS/" 
               target="_blank" rel="noopener noreferrer"

            <!-- Instagram -->
            <a href="https://www.instagram.com/computectux?igsh=bDk0Z3BrdHRkb2Riy" 
               target="_blank" rel="noopener noreferrer" 
               class="flex items-center justify-between w-full py-3.5 px-4 text-xs font-medium tracking-widest text-slate-700 border border-slate-100 bg-slate-50/40 rounded-xl uppercase mono transition-all duration-300 hover:border-pink-400 hover:bg-white hover:shadow-md active:scale-[0.98] md:active:scale-100">

        </nav>

        <!-- Footer / Slogan Oficial (Más grande, claro y estético) -->
        <footer class="mt-8 pt-2 text-xs sm:text-sm tracking-wide text-blue-950 font-semibold leading-relaxed px-1">
            Computec: <span class="text-slate-500 font-normal block sm:inline">Compromiso total con tu equipo.</span>
        </footer>

    </div>

    <!-- JavaScript -->
    <script>
        // --- EFECTO DE ESCRITURA DOBLE ---
        const firstText = "BIENVENIDOS";
        const finalText = "COMPUTEC";
        const logoContainer = document.getElementById("typing-logo");

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startTypingAnimation() {
            for (let i = 0; i <= firstText.length; i++) {
                logoContainer.innerHTML = firstText.substring(0, i);
                await sleep(90);
            }
            await sleep(1200);
            for (let i = firstText.length; i >= 0; i--) {
                logoContainer.innerHTML = firstText.substring(0, i);
                await sleep(50);
            }
            await sleep(300);
            for (let i = 0; i <= finalText.length; i++) {
                logoContainer.innerHTML = finalText.substring(0, i);
                await sleep(100);
            }
        }

        window.onload = startTypingAnimation;

        // --- EFECTO COLOR AL TOCAR LA PANTALLA ---
        const screen = document.getElementById("screen");
        
        screen.addEventListener("pointerdown", (e) => {
            if (e.target.closest('a')) return;
            screen.style.backgroundColor = "#e0f2fe"; 
        });

        const resetBackground = () => {
            screen.style.backgroundColor = "#f4f7fc";
        };

        screen.addEventListener("pointerup", resetBackground);
        screen.addEventListener("pointerleave", resetBackground);
    </script>

</body>
</html>
